# Скопируйте в config/router.secrets.yaml (файл в .gitignore).

ssh_password: "change-me"

# Секреты xray-server. Сгенерировать пару ключей: xray x25519
# Значения ниже — только для проверки рендера; замените на свои.
xray:
  clients:
    - id: "00000000-0000-0000-0000-000000000000"
      flow: "xtls-rprx-vision"
  reality:
    private_key: "YOUR_REALITY_PRIVATE_KEY_BASE64URL"
    short_ids:
      - "0123456789abcdef"
