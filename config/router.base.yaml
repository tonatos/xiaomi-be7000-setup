# Системный базовый конфиг.
# Загружается автоматически и объединяется с config/router.yaml.
# Любое поле можно переопределить в пользовательском config/router.yaml.
#
# Полезные официальные источники:
# - Xray config reference: https://xtls.github.io/config/
# - Xray VLESS inbound: https://xtls.github.io/config/inbounds/vless.html
# - Xray Reality: https://xtls.github.io/config/transport.html#realityobject
# - mihomo config wiki: https://wiki.metacubex.one/config/
# - Docker Compose spec: https://docs.docker.com/reference/compose-file/

router:
  # IP/домен роутера в вашей LAN для SSH-подключений.
  host: "192.168.31.1"
  # Порт SSH на роутере.
  ssh_port: 22
  # Пользователь SSH (обычно root для Xiaomi/OpenWrt).
  ssh_user: "root"

# Выбор клиента для проксирования (mihomo или v2raya)
proxy_client: "mihomo"

usb:
  # Явная точка монтирования USB на роутере (если пусто, определяется автоматически).
  mount_path: ""

stack:
  # Каталог стека на USB: $USB/<relative_dir>.
  relative_dir: "stack"
  # Подкаталог бэкапов внутри USB: $USB/<backups_relative_dir>.
  backups_relative_dir: "backups"

startup:
  # Базовый каталог автозапуска в прошивке роутера.
  base_dir: "/data/startup"
  # Подкаталог с autorun-скриптами.
  autoruns_subdir: "autoruns"

docker:
  # Зеркала Docker Hub (docker.io), применяются через UCI mi_docker.
  # Документация registry mirrors: https://docs.docker.com/docker-hub/image-library/mirror/
  registry_mirrors:
    - "https://cr.yandex"
    - "https://dh-mirror.gitverse.ru"

services:
  xray_server:
    # Включить/выключить сервис xray-server в compose.
    enabled: true
    # container_name для compose-сервиса xray.
    container_name: "xray-server"
    # Образ контейнера xray-server.
    image: "ghcr.io/xtls/xray-core:25.1.30"
  mihomo:
    # Включить/выключить сервис mihomo.
    enabled: true
    # container_name для compose-сервиса mihomo.
    container_name: "mihomo"
    # Образ контейнера mihomo.
    image: "docker.io/metacubex/mihomo:latest"
    # Runtime-данные mihomo (GeoIP/GeoSite/кэш) вне stack.
    runtime_volume: "../mihomo-runtime:/root/.config/mihomo"
    # Конфиг mihomo остаётся в stack и монтируется read-only.
    settings_volume: "./configs/mihomo-config/config.yaml:/root/.config/mihomo/config.yaml:ro"
    # mixed-port в итоговом mihomo-config (локальный mixed proxy порт).
    mixed_port: 7890
    # redir-port в итоговом mihomo-config (transparent proxy порт).
    redir_port: 7891
  v2raya:
    # Включить/выключить сервис v2raya.
    enabled: false
    # container_name для compose-сервиса v2raya.
    container_name: "v2raya"
    # Образ контейнера v2raya.
    image: "mzz2017/v2raya:latest"
    # Runtime-данные v2rayA (state/db/cache) вне stack.
    runtime_volume: "../v2raya-runtime:/etc/v2raya"
    # Legacy-совместимость: если задан services.v2raya.volume, он имеет приоритет.
    # Порт для web UI v2raya.
    port: 2017
    # TCP transparent redirect (dokodemo-door «transparent» в ядре v2rayA; см. v2rayTmpl.go, порт 52345).
    # Используется только при v2raya.transparent_mode: "redirect".
    # При routing.apply_iptables: true lan-routing.sh делает REDIRECT на этот порт.
    redir_port: 52345
  torrserver:
    # Включить/выключить TorrServer.
    enabled: true
    # container_name для TorrServer.
    container_name: "torrserver"
    # Образ TorrServer.
    image: "ghcr.io/yourok/torrserver:latest"
    # Порт TorrServer на роутере (host network).
    port: 8090
    # чтобы не раздувать stack-бэкапы.
    runtime_volume: "../torrserver-runtime:/opt/torrserver"
    # Только settings.json остаётся в stack/configs и монтируется read-only.
    settings_volume: "./configs/torrserver/config/settings.json:/opt/torrserver/config/settings.json:ro"
    # Пути для официального docker-entrypoint (`TS_CONF_PATH`, `TS_LOG_PATH`, `TS_TORR_DIR`).
    path: "/opt/torrserver/config"
    torrents_dir: "/opt/torrserver/torrents"
    log_path_dir: "/opt/torrserver/log"
    log_file: "torrserver.log"
    weblog_file: "access.log"
  metacubexd:
    # Включить/выключить dashboard metacubexd.
    enabled: true
    # container_name для metacubexd.
    container_name: "metacubexd"
    # Образ web-dashboard metacubexd.
    image: "gzxhwq/metacubexd:latest"
    # Внешний порт dashboard на роутере.
    port: 9099
  adguardhome:
    # Включить/выключить контейнер AdGuard Home в compose.
    enabled: true
    # container_name для AdGuard Home.
    container_name: "adguardhome"
    # Образ AdGuard Home.
    image: "docker.io/adguard/adguardhome:latest"
    # Использовать host-network для корректного клиентского IP и простоты маршрутизации.
    network_mode: "host"
    # Конфиг AdGuard Home (YAML) хранится в stack и бэкапится.
    conf_dir: "./configs/adguardhome/conf"
    # Runtime-данные AGH (data, фильтры, кэш, статистика) держим вне stack/
    work_dir: "../adguardhome-runtime/work"
  # Пользовательские compose-сервисы (имя -> тело сервиса по Docker Compose spec).
  # Эти сервисы будут добавлены в общий docker-compose.yml как есть.
  # Smoke проверяет только встроенные сервисы проекта.
  # Документация формата сервиса:
  # https://docs.docker.com/reference/compose-file/services/
  custom: {}

# Настройки TorrServer (рендерятся в configs/torrserver/config/settings.json).
torrserver:
  settings:
    CacheSize: 67108864
    ConnectionsLimit: 25
    DisableDHT: false
    DisablePEX: false
    DisableTCP: false
    DisableUPNP: false
    DisableUTP: false
    DisableUpload: false
    DownloadRateLimit: 0
    EnableDLNA: false
    EnableDebug: false
    EnableIPv6: false
    EnableProxy: false
    EnableRutorSearch: false
    EnableTorznabSearch: false
    ForceEncrypt: false
    FriendlyName: ""
    PeersListenPort: 0
    # Буфер предзагрузки
    PreloadCache: 50 
    ProxyHosts: null
    # Опережающий кеш
    ReaderReadAHead: 95
    RemoveCacheOnDrop: false
    ResponsiveMode: true
    RetrackersMode: 1
    ShowFSActiveTorr: true
    SslCert: ""
    SslKey: ""
    SslPort: 0
    StoreSettingsInJson: true
    StoreViewedInJson: false
    TMDBSettings:
      APIKey: ""
      APIURL: "https://api.themoviedb.org"
      ImageURL: "https://image.tmdb.org"
      ImageURLRu: "https://imagetmdb.com"
    TorrentDisconnectTimeout: 30
    TorrentsSavePath: "/opt/torrserver/torrents"
    TorznabUrls: null
    UploadRateLimit: 0
    UseDisk: true

# Конфигурация приложения AdGuard Home (AdGuardHome.yaml, dnsmasq forward).
# Сервис в Docker задаётся в services.adguardhome.
# Документация: https://github.com/AdguardTeam/AdGuardHome/wiki/Configuration
adguardhome:
  # Web UI (первичный wizard и админка). Важно: не конфликтует с xray (443) и metacubexd (9099).
  admin_port: 3000
  # DNS-порт AGH для форвардинга из dnsmasq. Не 53 — на OpenWrt 53 обычно занят dnsmasq.
  dns_port: 5353
  # Адрес AGH для UCI dnsmasq (server=…#порт). Обычно 127.0.0.1 при host network.
  dns_host: "127.0.0.1"
  # Порт HTTPS UI/DoH в терминах AGH (в шаблоне UI пока только HTTP; 0 = не занимать 443).
  https_port: 0
  # Прокси для исходящих HTTP(S) запросов AGH (фильтры, DoH upstream).
  # Рекомендуется для стека: "socks5://127.0.0.1:7890" (через mihomo) или "socks5://127.0.0.1:20170" (через v2raya).
  # При выключенном клиенте http_proxy в YAML не подставляется, кроме случая
  # http_proxy_ignore_proxy_state: true.
  http_proxy: "socks5://127.0.0.1:7890"
  http_proxy_ignore_proxy_state: false
  upstream_dns:
    - "https://9.9.9.10/dns-query"
    - "https://149.112.112.10/dns-query"
  bootstrap_dns: []
  fallback_dns: []
  filters_update_interval: 24
  bind_hosts:
    - "0.0.0.0"
  allowed_clients: []
  disallowed_clients: []

xray:
  # Уровень логирования Xray.
  # Документация: https://xtls.github.io/config/log.html
  log_level: "warning"
  inbound:
    # Произвольный tag inbound (используется в route-правилах Xray).
    tag: "vless-reality-in"
    # Адрес прослушивания входящих подключений.
    listen: "0.0.0.0"
    # Порт VLESS+Reality inbound.
    port: 443
    # Протокол inbound.
    protocol: "vless"
  # Список клиентов VLESS inbound.
  # Документация клиентов VLESS: https://xtls.github.io/config/inbounds/vless.html#clientobject
  clients:
    - # UUID клиента.
      id: "00000000-0000-0000-0000-000000000000"
      # Flow клиента (для Reality обычно xtls-rprx-vision).
      flow: "xtls-rprx-vision"
  reality:
    # Сервер-маскировка (target) для Reality.
    dest: "ya.ru:443"
    # Версия протокола Reality (обычно 0).
    xver: 0
    # Допустимые SNI для Reality-клиентов.
    server_names:
      - "ya.ru"
      - "vk.com"
    # Приватный ключ Reality (x25519), сгенерируйте через `task vless-server-setup`.
    private_key: "REPLACE_WITH_REALITY_PRIVATE_KEY"
    # Список short_id (hex), используемых клиентами.
    short_ids:
      - "0123456789abcdef"
    # uTLS fingerprint клиента (chrome/firefox/safari и т.д.).
    fingerprint: "chrome"
  routing:
    # Локальный SOCKS upstream host для outbound в Xray.
    socks_upstream_host: "127.0.0.1"
    # Локальный SOCKS upstream port для outbound в Xray.
    # По умолчанию: 7890 (для mihomo) или 20170 (для v2raya).
    socks_upstream_port: 7890

public_endpoint:
  # Публичный IP/домен для генерации vless-ссылки (`vless-link`).
  host: ""

v2raya:
  # Режим прозрачного прокси для v2rayA:
  # - tun: основной режим (перехват TCP+UDP/QUIC через TUN в ядре v2rayA)
  # - redirect: legacy-режим (TCP REDIRECT через iptables/redir_port)
  transparent_mode: "tun"
  # Шаблон имени tun-интерфейса v2rayA для FORWARD ACCEPT в iptables.
  # По умолчанию "tun+" (например tun0, tun1). Поменяйте, если в вашей сборке иное имя.
  tun_interface: "tun+"

routing:
  # Применять ли iptables REDIRECT для TCP из LAN (redir-port).
  # При TUN-режиме (mihomo.tun.enable: true ИЛИ v2raya.transparent_mode: tun)
  # — необязательно: TUN перехватывает и TCP, и UDP.
  # При apply_iptables: true TCP дополнительно перехватывается через NAT REDIRECT (гибридный режим).
  apply_iptables: false
  # OUTPUT-redir для TCP трафика самого роутера к fake-ip диапазону.
  # Нужен, если apply_iptables: true — чтобы curl/wget роутера работали при fake-ip DNS.
  apply_router_output_iptables: true
  # Диапазон fake-ip, редиректируемый в redir-port (только при apply_iptables: true).
  router_output_fake_cidr: "198.18.0.0/16"
  # CIDR вашей LAN (используется при генерации iptables-правил).
  lan_cidr: "192.168.31.0/24"
  # Принудительно направлять DNS-запросы клиентов LAN (TCP/UDP 53) в DNS mihomo.
  # Это нужно, чтобы fake-ip и доменные правила mihomo применялись для всех клиентов
  # даже когда системный dnsmasq смотрит в провайдерские DNS.
  mihomo_dns_redirect: true
  # Порт DNS-сервера mihomo для LAN DNS REDIRECT.
  # Должен совпадать с mihomo.dns.listen (по умолчанию 0.0.0.0:1053).
  mihomo_dns_port: 1053
  # Список IP, исключённых из transparent proxy (например, Xbox/PS с чувствительным NAT).
  excluded_ips: []
  # Блокировать QUIC (UDP/443) через iptables FORWARD DROP.
  # УСТАРЕЛО при TUN-режиме: TUN перехватывает UDP/QUIC и заворачивает в прокси.
  # Оставлено для режима без TUN (apply_iptables без tun.enable).
  block_quic: false
  performance_tuning:
    # Включить runtime-тюнинг RPS/XPS/RFS для лучшего распределения softirq по ядрам.
    # Полезно при высоком трафике через TUN/REDIRECT на роутерах с перекосом NET_RX в одно ядро.
    # Применяется в routing/lan-routing.sh на start и снимается на stop.
    enabled: false
    # Какие интерфейсы тюнить (если есть в системе). Пустой список => ничего не менять.
    interfaces:
      - "br-lan"
      - "Meta"
    # Маска CPU для rps_cpus/xps_cpus (hex bitmask): "f" для 4 ядер (CPU0-CPU3).
    cpu_mask: "f"
    # Глобальный размер таблицы RFS.
    rps_sock_flow_entries: 32768
    # rps_flow_cnt на каждую RX-очередь.
    rps_flow_cnt: 4096
    # Если интерфейс Meta ещё не поднят в момент старта routing-скрипта,
    # запускается фоновый watcher, который подождёт появление Meta и применит tuning.
    # 0 = не ждать.
    meta_wait_seconds: 30

# Ключи здесь соответствуют нативному формату mihomo.
# Документация: https://wiki.metacubex.one/config/
mihomo:
  # Режим работы маршрутизации (rule/global/direct/script).
  mode: rule
  # Уровень логирования mihomo.
  log-level: info

  tun:
    # TUN-режим mihomo: перехватывает TCP и UDP (QUIC/HTTP3) из LAN без iptables REDIRECT.
    # Требует cap_add: [NET_ADMIN] и devices: [/dev/net/tun] в compose (выставлены автоматически).
    # На роутере дополнительно применяется FORWARD ACCEPT для LAN -> Meta.
    enable: true
    # mixed: TCP через системный стек, UDP через gVisor. Рекомендован для маршрутизатора.
    stack: mixed
    # Автоматически определять исходящий интерфейс (eth0 / WAN).
    auto-detect-interface: true
    # Проксируем только транзит LAN->WAN; локальные процессы роутера (в т.ч. TorrServer)
    # в TUN не отправляем.
    include-interface:
      - br-lan

  sniffer:
    # Включение sniffer (L7-определение доменов).
    enable: true
    # Форсировать DNS mapping для sniffed-сессий.
    force-dns-mapping: true
    # Разбор pure IP подключений.
    parse-pure-ip: true
    sniffing:
      # Включить sniffing для TLS.
      - tls
      # Включить sniffing для HTTP.
      - http
      # QUIC (HTTP/3): sniffing нужен для определения домена из QUIC Initial пакетов через TUN.
      - quic
    # Подменять destination на sniffed-домен.
    override-destination: true

  dns:
    # Включить DNS-подсистему mihomo.
    enable: true
    # Адрес и порт DNS-сервера mihomo.
    listen: "0.0.0.0:1053"
    # Разрешать IPv6 DNS-ответы.
    ipv6: false
    # Режим DNS (fake-ip/redir-host).
    enhanced-mode: fake-ip
    # Диапазон fake-ip.
    fake-ip-range: 198.18.0.1/16
    nameserver:
      # Основной DNS резолвер.
      - 1.1.1.1
      # Резервный DNS резолвер.
      - 8.8.8.8
    fallback:
      # Fallback DNS over TLS.
      - tls://1.1.1.1:853
      # Fallback DNS over TLS.
      - tls://8.8.8.8:853
    fallback-filter:
      # Включить geoip-фильтрацию fallback.
      geoip: true
      geosite:
        # geosite-тег для fallback-маршрутизации.
        - category-porn
        # geosite-тег для fallback-маршрутизации.
        - openai
    nameserver-policy:
      # Политика DNS для geosite:category-ru.
      "geosite:category-ru":
        - 77.88.8.8
        - 77.88.8.1

  proxies:
    - # Имя outbound-прокси, используется в proxy-groups/rules.
      name: "upstream"
      # Тип прокси (ss/vless/vmess/trojan/...).
      type: ss
      # Адрес upstream сервера.
      server: ""

  # Пример для Shadowsocks:
  #   - name: "upstream"
  #     type: ss
  #     server: ""
  #     port: 443
  #     cipher: chacha20-ietf-poly1305
  #     password: ""
  #     udp: false

  # Пример для VLESS+Reality (mihomo outbound):
  #   - name: "upstream"
  #     type: vless
  #     server: ""
  #     port: 443
  #     uuid: ""
  #     network: tcp
  #     tls: true
  #     udp: true
  #     flow: "xtls-rprx-vision"
  #     servername: "ya.ru"
  #     client-fingerprint: "chrome"
  #     reality-opts:
  #       public-key: ""
  #       short-id: ""

  proxy-groups:
    - # Имя группы прокси для rule-таргетов.
      name: "Proxy"
      # Тип группы (select/url-test/fallback/load-balance/...).
      type: select
      proxies:
        # Основной upstream из списка mihomo.proxies.
        - upstream
        # Прямой выход в интернет без прокси.
        - DIRECT

  rule-providers:
    refilter_domains:
      # Тип rule-provider.
      type: http
      # Тип правил в провайдере (domain/ipcidr/classical).
      behavior: domain
      # URL источника правил.
      url: "https://raw.githubusercontent.com/1andrevich/Re-filter-lists/main/domains_all.lst"
      # Локальный путь кеша правил в контейнере.
      path: ./ruleset/refilter_domains.txt
      # Интервал обновления (секунды).
      interval: 86400
      # Формат файла rule-provider.
      format: text
    refilter_ips:
      type: http
      behavior: ipcidr
      url: "https://raw.githubusercontent.com/1andrevich/Re-filter-lists/main/ipsum.lst"
      path: ./ruleset/refilter_ips.txt
      interval: 86400
      format: text

  rules:
    # Применять доменные правила re:filter через группу Proxy.
    - RULE-SET,refilter_domains,Proxy
    # Применять IP-правила re:filter через группу Proxy.
    - RULE-SET,refilter_ips,Proxy
    # Проксировать geosite category-ai-!cn.
    - GEOSITE,category-ai-!cn,Proxy
    # Трафик в CN направлять напрямую.
    - GEOIP,CN,DIRECT
    # Трафик в RU направлять напрямую.
    - GEOIP,RU,DIRECT
    # Все остальное напрямую (измените при необходимости).
    - MATCH,DIRECT

  # Адрес external-controller для dashboard/API mihomo.
  external-controller: "0.0.0.0:9010"
  # Секрет external-controller API (пусто = без авторизации).
  secret: ""
