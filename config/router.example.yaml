# Скопируйте в config/router.yaml и подставьте значения.
# Секреты — в config/router.secrets.yaml (см. router.secrets.example.yaml) или через переменные окружения.

router:
  host: "192.168.31.1"
  ssh_port: 22
  ssh_user: "root"

# Опционально: явный путь USB (иначе определяется по mi_docker.settings.device_uuid)
usb:
  mount_path: ""

stack:
  # Каталог на USB относительно корня флешки (docker compose + configs)
  relative_dir: "stack"
  backups_relative_dir: "backups"

startup:
  # Локальная автозагрузка на роутере (firewall include)
  base_dir: "/data/startup"
  autoruns_subdir: "autoruns"

services:
  xray_server:
    enabled: true
    container_name: "xray-server"
    image: "ghcr.io/xtls/xray-core:25.1.30"
  mihomo:
    enabled: true
    container_name: "mihomo"
    image: "docker.io/metacubex/mihomo:latest"
    mixed_port: 7890
    socks_port: 7890
    redir_port: 7891
  torrserver:
    enabled: true
    container_name: "torrserver"
    image: "docker.io/yourok/torrserver:latest"
    port: 8090

xray:
  log_level: "warning"
  inbound:
    tag: "vless-reality-in"
    listen: "0.0.0.0"
    port: 443
  reality:
    dest: "ya.ru:443"
    xver: 0
    server_names:
      - "ya.ru"
      - "vk.com"
    fingerprint: "chrome"
  routing:
    socks_upstream_host: "127.0.0.1"
    socks_upstream_port: 7890

# Публичный адрес для клиентов (WAN / VPS). Для vless-link и подсказок.
public_endpoint:
  host: ""
  # Если host пуст — в vless-link можно передать --host вручную

# Пример правил iptables для прозрачного прокси (осторожно: зависит от прошивки)
routing:
  apply_iptables: false
  lan_cidr: "192.168.31.0/24"

mihomo_proxy:
  # Шаблон upstream для mihomo (заполните в secrets или здесь для теста)
  name: "upstream"
  server: ""
  port: 443
  uuid: ""
  flow: "xtls-rprx-vision"
  sni: "ya.ru"
  fingerprint: "chrome"
  public_key: ""
  short_id: ""
