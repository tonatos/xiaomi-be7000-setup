# Скопируйте в config/router.yaml и заполните под вашу установку.
# Базовые значения хранятся в config/router.base.yaml.
# Этот файл переопределяет базу, поэтому можно указать только нужные поля.
#
# Официальные ссылки:
# - Xray config: https://xtls.github.io/config/
# - mihomo config: https://wiki.metacubex.one/config/

router:
  # LAN IP/домен роутера для SSH.
  host: "192.168.31.1"
  # Пароль SSH (можно также через env ROUTER_SSH_PASSWORD).
  ssh_password: "change-me"

services:
  xray_server:
    # Включить Xray-сервер.
    enabled: true
  mihomo:
    # Включить mihomo-клиент.
    enabled: true
  torrserver:
    # Включить TorrServer.
    enabled: true
  metacubexd:
    # Включить web-dashboard metacubexd.
    enabled: true
  # Опционально: добавьте собственные сервисы в общий docker-compose.
  # Формат каждого элемента — как в Docker Compose services.<name>.
  # custom:
  #   whoami:
  #     image: "traefik/whoami:latest"
  #     container_name: "whoami"
  #     restart: unless-stopped
  #     network_mode: host

public_endpoint:
  # Публичный IP/домен для команды vless-link (WAN/VPS endpoint).
  host: ""

xray:
  clients:
    - # UUID клиента VLESS.
      id: "00000000-0000-0000-0000-000000000000"
      # Flow клиента (для Reality обычно xtls-rprx-vision).
      flow: "xtls-rprx-vision"
  reality:
    # Приватный ключ пары Reality (генерируется: `xray x25519`).
    private_key: "YOUR_REALITY_PRIVATE_KEY_BASE64URL"
    # Список short_id (hex), используемый клиентами.
    short_ids:
      - "0123456789abcdef"

routing:
  # Включить прозрачный прокси через iptables для LAN.
  apply_iptables: false
  # IP-адреса устройств, которые нужно исключить из transparent proxy.
  excluded_ips: []

mihomo:
  # Настройка upstream-прокси для mihomo (пример Shadowsocks).
  proxies:
    - # Имя прокси, используется в proxy-groups/rules.
      name: "upstream"
      # Тип прокси (ss/vless/vmess/trojan/...).
      type: ss
      # Адрес upstream сервера.
      server: ""
      # Порт upstream сервера.
      port: 443
      # Cipher Shadowsocks.
      cipher: chacha20-ietf-poly1305
      # Пароль Shadowsocks.
      password: ""
      # Включение UDP для Shadowsocks outbound.
      udp: false
  # API-секрет external-controller (для metacubexd), пусто = без авторизации.
  secret: ""
